<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }
        .gallery img {
            margin: 10px;
            max-width: 300px;
            height: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Aviation Portfolio</h1>
    </header>
    <main>
        <section class="gallery">
            <img src="images/image1.jpg" alt="Aircraft Image 1">
            <img src="images/image2.jpg" alt="Aircraft Image 2">
            <img src="images/image3.jpg" alt="Aircraft Image 3">
        </section>
    </main>
</body>
</html>
