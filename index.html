<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        .hero { position: relative; overflow: hidden; }
        .gallery { display: none; position: absolute; width: 100%; height: 100%; }
        .nav-button { position: absolute; top: 50%; transform: translateY(-50%); background-color: rgba(255, 255, 255, 0.8); border: none; cursor: pointer; }
        .prev { left: 10px; }
        .next { right: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="gallery" id="gallery1">
            <img src="https://drive.google.com/uc?id=1PFErMB5oAa9Gfebw1M5zrHYPcar7ppe_&export=view" style="width: 100%;" />
        </div>
        <div class="gallery" id="gallery2">
            <img src="https://drive.google.com/uc?id=1AYaCykD_Lvs-iye20bOmchAFjqw3KDj9&export=view" style="width: 100%;" />
        </div>
        <button class="nav-button prev" onclick="changeSlide(-1)">❮</button>
        <button class="nav-button next" onclick="changeSlide(1)">❯</button>
    </div>
    <script>
        let index = 0;
        const slides = document.querySelectorAll('.gallery');
        function showSlide(n) {
            slides.forEach((slide) => slide.style.display = 'none');
            slides[n].style.display = 'block';
        }
        function changeSlide(n) {
            index = (index + n + slides.length) % slides.length;
            showSlide(index);
        }
        setInterval(() => changeSlide(1), 5000);
        showSlide(index);
    </script>
</body>
</html>
